site_name: Implosive Genesis
site_description: Rekursive Entstehung von Raum, Zeit und Bewusstsein (V_RIG, OIPK, Frameprinciple, Type-6)
site_author: GenesisAeon
repo_url: https://github.com/GenesisAeon/implosive-genesis
repo_name: GenesisAeon/implosive-genesis
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css: []

nav:
  - Home: index.md
  - Theorie:
    - Frame-Prinzip: theory/frameprinciple.md
    - OIPK: theory/oipk.md
    - Tesseract & CREP: theory/tesseract.md
    - Entropischer Preis: theory/entropic_price.md
  - Simulation:
    - Tesseract-Visualisierung & CMB: simulation/tesseract.md
  - API-Referenz: api.md
  - Beispiele: examples.md
  - CLI Reference: cli.md
  - Templates: templates.md
