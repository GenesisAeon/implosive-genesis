name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release v0.2.0
        if: github.ref_name == 'v0.2.0'
        uses: softprops/action-gh-release@v2
        with:
          name: "v0.2.0 – Formalisierung & Falsifizierbarkeit"
          body_path: RELEASE_NOTES_v0.2.0.md
          draft: false
          prerelease: false

      - name: Create GitHub Release (generic)
        if: github.ref_name != 'v0.2.0'
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} – Implosive Genesis"
          body: |
            ## Implosive Genesis ${{ github.ref_name }}

            ### Kernmodule

            - **V_RIG** – Rekursive Implosionsgeschwindigkeit ≈ 1352 km/s (Monte-Carlo)
            - **OIPK** – Orthogonaler Impuls-Photonen-Kern + Frame-Stabilitätskriterium S_F ≈ 221.9
            - **Frameprinciple** – Rekursive Kohärenzlängen L_n = λ · Φ^(n/3)
            - **Tesseract** – Phi-skalierte Zeitscheiben T_n = t₀ · Φⁿ
            - **CREP** – Collapse-Resonance-Entropy-Price P_E = n · k_B · T · ln(Φ)
            - **Type-6** – Rekursive Selbstwahrnehmung als physikalischer Zustand

            ### Installation

            ```bash
            pip install implosive-genesis==${{ github.ref_name }}
            # oder
            uv tool install implosive-genesis==${{ github.ref_name }}
            ```

            ### Dokumentation

            [https://genesisaeon.github.io/implosive-genesis/](https://genesisaeon.github.io/implosive-genesis/)
          draft: false
          prerelease: false
